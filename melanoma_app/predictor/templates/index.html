<!DOCTYPE html>
<html>
<head>
    <title>Melanoma Detection</title>

    <style>

        body{
            font-family: Arial;
            text-align:center;
            padding-top:50px;
            background:#f5f5f5;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        button{
            padding:10px 20px;
            margin-top:20px;
            cursor:pointer;
        }

        img{
            margin-top:20px;
            width:250px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Melanoma Detection</h1>

    <input type="file" id="fileInput">

    <br>

    <button onclick="uploadImage()">
        Predict
    </button>

    <div id="loading"></div>

    <div id="result"></div>

    <img id="preview">

</div>

<script>

async function uploadImage(){

    const fileInput = document.getElementById("fileInput");

    const file = fileInput.files[0];

    if(!file){
        alert("Choose image first");
        return;
    }

    document.getElementById("loading").innerHTML = "Predicting...";
    document.getElementById("result").innerHTML = "";

    const formData = new FormData();

    formData.append("file", file);

    document.getElementById("preview").src =
        URL.createObjectURL(file);

    const response = await fetch("/predict/",{
        method:"POST",
        body:formData
    });

    const data = await response.json();

    document.getElementById("loading").innerHTML = "";

    if(data.error){

        document.getElementById("result").innerHTML =
            data.error;

    }else{

        document.getElementById("result").innerHTML =
            `
            <h2>${data.prediction}</h2>
            <h3>Confidence: ${data.confidence}</h3>
            `;

    }

}

</script>

</body>
</html>
